<!DOCTYPE html>
<html>
<head>
  <title>System Alert</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial;
      background: #008080;
      overflow: hidden;
    }

    /* ===== CLICK GAME ===== */
    #game {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .window {
      width: 420px;
      background: #c0c0c0;
      border: 3px solid black;
      box-shadow: 5px 5px 0 black;
      padding: 20px;
      text-align: center;
    }

    .title {
      background: navy;
      color: white;
      padding: 5px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: red;
      border: 4px solid #300;
      color: white;
      font-size: 20px;
      margin: 15px auto;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 6px 0 #700;
    }

    .counter { margin-top: 10px; }
    .msg { margin-top: 10px; color: darkred; min-height: 20px; }

    /* ===== MAZE ===== */
    #maze {
      display: none;
      background: black;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
      margin: auto;
      background: #111;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
    }
  </style>
</head>

<body>

<!-- CLICKER GAME -->
<div id="game">
  <div class="window">
    <div class="title">Windows Security Alert</div>

    <div>Suspicious activity detected.</div>

    <div class="btn" id="btn">CLICK</div>

    <div class="counter">Clicks: <span id="count">0</span></div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<!-- MAZE GAME -->
<div id="maze">
  <div id="hud">Find the key 🔑</div>
  <canvas id="c" width="600" height="400"></canvas>
</div>

<script>
let clicks = 0;

const btn = document.getElementById("btn");
const countText = document.getElementById("count");
const msg = document.getElementById("msg");

btn.onclick = () => {
  clicks++;
  countText.textContent = clicks;

  if (clicks === 200) {
    startMaze();
  }

  msg.textContent = "Clicks: " + clicks;
};

/* ===== MAZE MODE ===== */

const mazeDiv = document.getElementById("maze");
const gameDiv = document.getElementById("game");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let player = { x: 50, y: 50, size: 20 };
let key = { x: 500, y: 300, size: 15, found: false };

function startMaze() {
  gameDiv.style.display = "none";
  mazeDiv.style.display = "block";

  draw();
}

document.addEventListener("keydown", (e) => {
  if (mazeDiv.style.display === "none") return;

  let speed = 10;

  if (e.key === "w") player.y -= speed;
  if (e.key === "s") player.y += speed;
  if (e.key === "a") player.x -= speed;
  if (e.key === "d") player.x += speed;

  checkKey();
  draw();
});

function checkKey() {
  if (
    Math.abs(player.x - key.x) < 20 &&
    Math.abs(player.y - key.y) < 20
  ) {
    key.found = true;
    document.getElementById("hud").textContent = "You found the key 🔑 Now escape!";
  }
}

function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, 600, 400);

  // player
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // key
  if (!key.found) {
    ctx.fillStyle = "yellow";
    ctx.fillRect(key.x, key.y, key.size, key.size);
  } else {
    ctx.fillStyle = "red";
    ctx.fillText("EXIT UNLOCKED", 250, 200);
  }
}
</script>

</body>
</html>
