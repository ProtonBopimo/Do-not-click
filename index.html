<!DOCTYPE html>
<html>
<head>
  <title>Entity Chase</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: monospace;
      color: white;
    }

    #menu {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      flex-direction: column;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }

    canvas {
      display: none;
      background: #000;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div id="menu">
  <h1>ENTITY CHASE</h1>
  <button onclick="start('easy')">Easy</button>
  <button onclick="start('medium')">Medium</button>
  <button onclick="start('hard')">Hard</button>
</div>

<div id="hud"></div>
<canvas id="c" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");
const menu = document.getElementById("menu");

let player, monster, key, speed, mSpeed, level;
let keys = {};

function start(diff) {
  menu.style.display = "none";
  canvas.style.display = "block";

  level = diff;

  if (diff === "easy") {
    speed = 6;
    mSpeed = 2;
  }
  if (diff === "medium") {
    speed = 5;
    mSpeed = 3;
  }
  if (diff === "hard") {
    speed = 4;
    mSpeed = 4.5;
  }

  player = { x: 100, y: 100, size: 20 };
  monster = { x: 700, y: 400, size: 25 };
  key = spawnKey();

  loop();
}

function spawnKey() {
  return {
    x: Math.random() * 750,
    y: Math.random() * 450,
    size: 15,
    taken: false
  };
}

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

function update() {
  // PLAYER MOVE
  if (keys["w"]) player.y -= speed;
  if (keys["s"]) player.y += speed;
  if (keys["a"]) player.x -= speed;
  if (keys["d"]) player.x += speed;

  // ❌ NO OUTSIDE MAP
  player.x = clamp(player.x, 0, canvas.width - player.size);
  player.y = clamp(player.y, 0, canvas.height - player.size);

  // MONSTER CHASE
  let dx = player.x - monster.x;
  let dy = player.y - monster.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  monster.x += (dx / dist) * mSpeed;
  monster.y += (dy / dist) * mSpeed;

  // KEY PICKUP
  if (!key.taken &&
    Math.abs(player.x - key.x) < 20 &&
    Math.abs(player.y - key.y) < 20
  ) {
    key.taken = true;
    hud.textContent = "Key collected... survive.";
  }

  // WIN CONDITION
  if (key.taken &&
    Math.abs(player.x - monster.x) < 20 &&
    Math.abs(player.y - monster.y) < 20
  ) {
    hud.textContent = "YOU ESCAPED LEVEL: " + level.toUpperCase();
    cancelAnimationFrame(loopId);
  }

  // LOSE CONDITION
  if (Math.abs(player.x - monster.x) < 15 &&
      Math.abs(player.y - monster.y) < 15) {
    hud.textContent = "YOU WERE CAUGHT.";
    cancelAnimationFrame(loopId);
  }
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // player
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // monster
  ctx.fillStyle = "red";
  ctx.fillRect(monster.x, monster.y, monster.size, monster.size);

  // key
  if (!key.taken) {
    ctx.fillStyle = "yellow";
    ctx.fillRect(key.x, key.y, key.size, key.size);
  }
}

let loopId;

function loop() {
  update();
  draw();
  loopId = requestAnimationFrame(loop);
}
</script>

</body>
</html>
