<!DOCTYPE html>
<html>
<head>
  <title>System Alert</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #008080;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Tahoma, Arial;
      transition: 0.3s;
    }

    .window {
      width: 420px;
      background: #c0c0c0;
      border: 3px solid black;
      box-shadow: 5px 5px 0 black;
      padding: 20px;
      text-align: center;
    }

    .title {
      background: navy;
      color: white;
      padding: 5px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .btn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid #300;
  background: red;
  color: white;
  font-size: 20px;
  cursor: pointer;
  margin: 15px auto;
  display: flex;
  justify-content: center;
  align-items: center;
  user-select: none;

  /* 3D effect */
  box-shadow: 0 6px 0 #700, 0 8px 10px rgba(0,0,0,0.5);
  transition: all 0.1s ease;
}
    .btn:active {
  transform: translateY(6px);
  box-shadow: 0 2px 0 #700, 0 3px 5px rgba(0,0,0,0.5);
}

    .counter {
      font-size: 18px;
      margin-top: 10px;
    }

    .msg {
      margin-top: 15px;
      font-weight: bold;
      color: darkred;
      min-height: 20px;
    }
  </style>
</head>

<body>

<div class="window">
  <div class="title">Windows Security Alert</div>

  <div>Suspicious activity detected.</div>

  <div class="btn" id="btn">CLICK</div>

  <div class="counter">Clicks: <span id="count">0</span></div>

  <div class="msg" id="msg"></div>
</div>

<!-- SCRIPT AT THE BOTTOM = NO ERRORS -->
<script>
let clicks = 0;

const btn = document.getElementById("btn");
const countText = document.getElementById("count");
const msg = document.getElementById("msg");

// random chaos events
const randomEvents = [
  () => {
    msg.textContent = "selling used data process started...";
  },
  () => {
    document.body.style.background = "#001f3f";
    msg.textContent = "📡 Sending data...";
  },
  () => {
    btn.style.transform = "scale(1.3)";
    msg.textContent = "⚙ System overload...";
  },
  () => {
    btn.style.transform = "rotate(10deg)";
    msg.textContent = "Error code 404...";
  },
  () => {
    msg.textContent = "tf are you doing here...";
  },
  () => {
    document.body.style.background = "black";
    msg.textContent = "Signal lost...";
  }
];

btn.addEventListener("click", () => {
  clicks++;
  countText.textContent = clicks;

  btn.textContent = "CLICKED";

  // small random chance every click
  if (Math.random() < 0.2) {
    msg.textContent = "???";
  }

  // every 5 clicks
  if (clicks % 5 === 0) {
    msg.textContent = "⚠ System instability detected...";
  }

  // every 10 clicks → RANDOM EVENT
  if (clicks % 10 === 0) {
    const i = Math.floor(Math.random() * randomEvents.length);
    randomEvents[i]();
  }

  // funny button text changes
  if (clicks === 1) btn.textContent = "DON'T";
  if (clicks === 3) btn.textContent = "STOP";
  if (clicks === 7) btn.textContent = "WHY";
});
</script>

</body>
</html>
